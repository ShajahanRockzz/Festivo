
<div class="admin-dashboard">
  <aside class="sidebar" [class.active]="sidebarOpen">
    <div class="sidebar-header">
      <div class="logo"></div>
      <h2>Festivo Admin</h2>
      <button class="toggle-btn neon-btn" (click)="sidebarOpen = !sidebarOpen">
        x
      </button>
    </div>
    
    <div class="nav-links">
      <ng-container *ngFor="let item of menuItems">
        <button class="nav-item submenu-toggle" (click)="toggleMenu(item)" [class.active]="item.expanded" style="width: 100%; border: none; text-align: left; background: transparent; cursor: pointer;">
          <i>{{ item.icon }}</i>
          <span>{{ item.label }}</span>
          <i style="margin-left: auto; margin-right: 0; font-size: 14px; width: auto;">{{ item.expanded ? '▼' : '▶' }}</i>
        </button>
        
        <div class="nav-submenu" *ngIf="item.expanded" style="margin-left: 20px; border-left: 1px solid rgba(255,255,255,0.08); padding-left: 10px;">
          <a *ngFor="let sub of item.submenu" [routerLink]="sub.route" class="nav-item sub-item" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" style="cursor: pointer; padding: 10px 16px; margin-bottom: 4px; font-size: 14px; display: flex; align-items: center;">
            <i style="font-size: 16px; margin-right: 12px; width: 24px; text-align: center;">{{ sub.icon }}</i>
            <span>{{ sub.label }}</span>
          </a>
        </div>
      </ng-container>
    </div>
    
    <div class="sidebar-footer">
      <a (click)="logout()" class="logout-btn neon-btn" style="cursor: pointer;">
        <i>🚪</i>
        <span>Logout</span>
      </a>
    </div>
  </aside>

  <div class="sidebar-overlay" [class.active]="sidebarOpen" (click)="sidebarOpen = !sidebarOpen"></div>

  <main class="main-content">
    <header class="top-header">
      <div class="header-left">
        <button class="mobile-toggle" (click)="sidebarOpen = !sidebarOpen">
          ☰
        </button>
        <h1 class="page-title">Festivo Admin <span>| Dashboard</span></h1>
      </div>
      
      <div class="header-right">
        <div class="notifications">
          <i>🔔</i>
          <span class="badge">0</span>
        </div>
        <div class="user-profile">
          <div style="background: rgba(255,255,255,0.1); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px;">👤</div>
          <div class="user-info">
            <span class="user-name">{{ adminName }}</span>
            <span class="user-role">Super Admin</span>
          </div>
          <i style="font-size: 12px; margin-left: 8px; color: #94a3b8;">▼</i>
        </div>
      </div>
    </header>
    
    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
