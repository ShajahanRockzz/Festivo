<div class="coordinatormaster-container">
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo">
        <span class="logo-icon">🎭</span>
        <span class="logo-text">Festivo</span>
      </div>
    </div>

    <div class="header-center">
      <span class="role-badge">Coordinator</span>
    </div>

    <div class="header-right">
      <div class="user-profile-container">
        <button class="user-profile-btn" [class.open]="userProfileOpen" (click)="toggleUserProfile()" [title]="coordinatorName">
          <span class="profile-icon">👤</span>
          <span class="profile-name">{{ coordinatorName }}</span>
          <span class="dropdown-arrow">▼</span>
        </button>

        <div *ngIf="userProfileOpen" class="profile-dropdown">
          <button class="dropdown-item logout-btn" (click)="logout()">
            <span class="icon">🚪</span> Logout
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Container -->
  <div class="main-container">


    <!-- Content Area -->
    <main class="content-area">
      <router-outlet></router-outlet>
    </main>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-left">
        <h3>Festivo Coordinator Platform</h3>
        <p>Manage your events efficiently</p>
      </div>
      <div class="footer-links">
        <a href="#help">Help</a>
        <a href="#privacy">Privacy</a>
        <a href="#terms">Terms</a>
      </div>
      <div class="footer-right">
        <p>&copy; 2024-2025 Festivo. All rights reserved.</p>
      </div>
    </div>
  </footer>
</div>
